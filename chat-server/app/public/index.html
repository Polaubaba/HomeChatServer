<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Shogun temple ahh </title>
  <style>
    body { font-family: system-ui, Arial; margin: 0; background:#0b1220; color:#e8eefc; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 18px; }
    .card { background:#111a2e; border:1px solid #223055; border-radius: 12px; padding: 16px; }
    input, button { padding: 10px; border-radius: 10px; border:1px solid #2a3a66; background:#0b1220; color:#e8eefc; }
    button { cursor:pointer; }
    .row { display:flex; gap:10px; flex-wrap:wrap; }
    #chat { height: 55vh; overflow:auto; padding: 12px; background:#0b1220; border:1px solid #223055; border-radius: 12px; }
    .msg { padding: 8px 10px; border-bottom: 1px solid #1d2a4a; }
    .meta { font-size: 12px; opacity: .8; margin-bottom: 4px; }
    .hidden { display:none; }
    .ok { color: #86efac; }
    .bad { color: #fca5a5; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Oporajita Chat</h2>

    <div class="card" id="loginCard">
      <h3>Login</h3>
      <div class="row">
        <input id="username" placeholder="username" autocomplete="username" />
        <input id="password" placeholder="password" type="password" autocomplete="current-password" />
        <button id="loginBtn">Login</button>
        <button id="registerBtn">Register</button>
      </div>
      <p id="loginStatus"></p>
      <p style="opacity:.8;font-size:13px;margin-top:10px;">
        Tip: Register creates a new user (you can disable it later).
      </p>
    </div>

    <div class="card hidden" id="chatCard">
      <div class="row" style="align-items:center;justify-content:space-between;">
        <div>
          Status: <span id="conn" class="bad">disconnected</span>
        </div>
        <button id="logoutBtn">Logout</button>
      </div>

      <div style="margin-top:12px;" id="chat"></div>

      <div class="row" style="margin-top:12px;">
        <input id="msg" placeholder="Type a message…" style="flex:1; min-width:240px;" />
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <!-- Socket.IO client from your server -->
  <script src="/socket.io/socket.io.js"></script>
  <script>
    let token = null;
    let socket = null;

    const el = (id) => document.getElementById(id);
    const chatBox = el("chat");

    function addMsg(m) {
      const div = document.createElement("div");
      div.className = "msg";
      const time = m.created_at ? new Date(m.created_at).toLocaleString() : "";
      div.innerHTML = `<div class="meta">${m.username} <span style="opacity:.7;">${time}</span></div>
                       <div>${escapeHtml(m.text)}</div>`;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[c]));
    }

    async function api(path, body) {
      const res = await fetch(path, {
        method: "POST",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify(body)
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Request failed");
      return data;
    }

    async function loadRecent() {
      const res = await fetch("/api/messages/recent?limit=50");
      const data = await res.json();
      chatBox.innerHTML = "";
      (data.messages || []).forEach(addMsg);
    }

    function connectSocket() {
      socket = io({
        auth: { token }
      });

      socket.on("connect", () => {
        el("conn").textContent = "connected";
        el("conn").className = "ok";
      });

      socket.on("disconnect", () => {
        el("conn").textContent = "disconnected";
        el("conn").className = "bad";
      });

      socket.on("chat:new", (msg) => addMsg(msg));
    }

    function showChat() {
      el("loginCard").classList.add("hidden");
      el("chatCard").classList.remove("hidden");
    }

    function showLogin() {
      el("chatCard").classList.add("hidden");
      el("loginCard").classList.remove("hidden");
      el("loginStatus").textContent = "";
      token = null;
      if (socket) socket.disconnect();
      socket = null;
    }

    el("loginBtn").onclick = async () => {
      try {
        el("loginStatus").textContent = "Logging in…";
        const u = el("username").value.trim();
        const p = el("password").value;
        const data = await api("/api/login", { username: u, password: p });
        token = data.token;
        showChat();
        await loadRecent();
        connectSocket();
      } catch (e) {
        el("loginStatus").textContent = "❌ " + e.message;
      }
    };

    el("registerBtn").onclick = async () => {
      try {
        el("loginStatus").textContent = "Registering…";
        const u = el("username").value.trim();
        const p = el("password").value;
        const data = await api("/api/register", { username: u, password: p });
        token = data.token;
        showChat();
        await loadRecent();
        connectSocket();
      } catch (e) {
        el("loginStatus").textContent = "❌ " + e.message;
      }
    };

    el("sendBtn").onclick = () => {
      const t = el("msg").value;
      el("msg").value = "";
      if (!socket) return;
      socket.emit("chat:send", t, (ack) => {
        if (!ack?.ok) alert(ack?.error || "Send failed");
      });
    };

    el("msg").addEventListener("keydown", (e) => {
      if (e.key === "Enter") el("sendBtn").click();
    });

    el("logoutBtn").onclick = () => showLogin();
  </script>
</body>
</html>
