services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: chatdb
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: change_me_db_password
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: ./app
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://chatuser:change_me_db_password@db:5432/chatdb
      JWT_SECRET: change_me_super_long_random_secret
      CORS_ORIGIN: https://chat.oporajita.win
    depends_on:
      - db
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  db_data:
  caddy_data:
  caddy_config:
